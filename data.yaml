  type: talk
  title: When an Agent Acts on Your Behalf, Who Holds the Keys?
  speakers: Mariusz Sabath;Maia Iyer
  orgs: IBM Research;IBM Research
  room: Auditorium
  track: AI + ML
  level: Intermediate
  description: 'The session addresses a critical security challenge: when agents execute
    actions, determining accountability becomes ambiguous. Traditional static API
    keys lack sufficient context for proper authorization and auditing. The presenters
    will showcase an architecture that ''cryptographically binds agent identity with
    delegated user identity.'' The approach leverages SPIRE''s workload attestation
    capabilities to establish verifiable agent identity, uses Keycloak as an OAuth
    2.0 server for managing delegated user credentials across complex transactions,
    and introduces an open-source MCP Gateway that applies policy enforcement and
    audit controls at a centralized trusted checkpoint. Attendees will understand
    how to construct systems where ''every action is traceable to both the code that
    execute it and the user who approved it.'''
  url: https://kccnceu2026.sched.com/event/2CVxt/
