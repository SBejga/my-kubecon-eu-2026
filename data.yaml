  type: talk
  title: Operationalizing AI Workloads on Kubernetes With OpenKruise
  speakers: Zhen Zhang;Vec Sun
  orgs: Alibaba Group;Xiaohongshu (RedNote)
  room: E103-105
  track: Maintainer Track
  level: ''
  description: 'AI applications running on Kubernetes present distinctive operational
    hurdles. Container packages with substantial machine learning models need advance
    caching for rapid initialization. Distributed model training typically operates
    as coordinated pod groups requiring synchronized scheduling and termination. Native
    Kubernetes lacks mechanisms for group-level disruption management - ''PodDisruptionBudget
    treats pods individually, risking partial job failures during node maintenance
    or hardware issues.'' OpenKruise addresses these challenges through: (1) scheduled
    image pre-warming to pre-stage AI containers on designated nodes; (2) group-aware
    disruption enforcement at the PodGroup level; and (3) forthcoming ContainerRestartRequest
    enhancements enabling coordinated in-place restarts across entire PodGroups, selectively
    rebuilding pods while performing rolling restarts on others.'
  url: https://kccnceu2026.sched.com/event/2EF4p/
  tags:
  - ai
