  level: Intermediate
  description: 'Platform teams encounter a fundamental challenge: developers require
    straightforward APIs and interfaces, yet constructing and maintaining them diverts
    significant resources from strategic platform initiatives. This presentation introduces
    ''Reverse GitOps,'' positioning an API-first methodology that incorporates a lightweight
    Kubernetes control plane preceding your Git repository. The session demonstrates
    how platform teams can establish streamlined Custom Resource Definitions functioning
    as declarative APIs, enabling GUI development (Backstage/Headlamp) or programmatic
    developer and AI agent interactions. The open-source gitops-reverser operator
    converts user interactions into Git commits and pull requests, preserving existing
    review workflows while enabling manifests expansion through KRO or Crossplane,
    integrating with Flux or ArgoCD-powered GitOps systems.'
