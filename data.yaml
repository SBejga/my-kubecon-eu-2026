  title: Securing Multi-Tenant SaaS Platforms With Keycloak - Ritu Soni & Rishabh
    Tiwari, SkillBrew.AI
  speakers: Ritu Soni;Rishabh Tiwari
  orgs: SkillBrew.AI;SkillBrew.AI
  room: Hall 7 | Room A
  track: KeycloakCon
  level: Intermediate
  description: The session addresses scaling challenges in SkillBrew.AI's multi-tenant
    platform handling 50k+ concurrent users. The team encountered token validation
    and authorization sync failures causing authentication drops during heavy load.
    They implemented Keycloak's Resource Server export/import mechanism for version-controlling
    authorization configs, achieving a 40% reduction in auth latency and eliminated
    cross-env drift. The presentation covers architecture decisions, debugging approaches,
    and best practices for high-availability Keycloak production setups with focus
    on distributed systems authorization scaling.
