  title: 'Tutorial: KV-Cache Wins You Can Feel: Building AI-Aware LLM Routing on Kubernetes'
  speakers: Tyler Michael Smith;Kay Yan;Vita Bortnikov;Michal Malka;Maroon Ayoub
  orgs: Red Hat;DaoCloud;IBM;IBM Research;IBM Research
  room: Elicium 1
  track: AI + ML
  level: Any
  description: 'Every LLM request carries invisible state: the KV-cache. Hit it, and
    your response is 10x cheaper and 50x faster. Miss it, and you''re recomputing
    work you just did. Yet Kubernetes'' default load balancing is cache-blind, scattering
    related requests across pods and destroying locality. Attendees will deploy a
    distributed vLLM cluster, benchmark its performance, and visualize how cache-blind
    routing wastes GPU cycles. Then, they will replace the default Service with the
    Kubernetes Gateway API (Inference Extension) and deploy llm-d, a Kubernetes-native
    framework for distributed LLM inference with an AI-aware scheduler.'
  url: https://kccnceu2026.sched.com/event/2CW5y/
  tags:
  - ai
