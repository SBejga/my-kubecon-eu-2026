  title: Are We Stuck With Helm Forever? A Landscape of Cloud Native CNF Management
    Options
  speakers: Liam Fallon;Istvan Kispal
  orgs: Ericsson Software Technology;Nokia Bell Labs
  room: G104-105
  track: Cloud Native Telco Day
  level: ''
  description: Helm was the de facto tool to manage the lifecycle of LCMs for a very
    long time. It was the first tool to manage the LCM of complex workloads and provided
    a way to standardize on the management of CNF. But Helm has its limitations and
    the tool landscape evolved and diversified. There are tools focusing on platform
    customisation, configuration management or GitOps. Each of them has different
    benefits and drawbacks. This talk collects the most prominent options for CNF
    management, explains the differences between them and compares benefits and drawbacks.
  url: https://colocatedeventseu2026.sched.com/event/2DY1k/
  tags:
  - helm
  - gitops
