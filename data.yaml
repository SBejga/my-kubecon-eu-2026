  type: talk
  title: The Keycloak-Token-Configuration Mistake, 90% of All Developers Do (and How
    To Avoid It)
  speakers: Niko Kobler
  orgs: Niko Kobler IT-Beratung
  room: Hall 7 | Room A
  track: KeycloakCon
  level: Intermediate
  description: 'The presentation addresses a common Keycloak configuration issue.
    By default, Keycloak puts a lot of information into your tokens: roles, claims,
    metadata, which creates several problems: tokens contain excessive data, recipients
    receive unnecessary information, data protection principles are not optimally
    implemented, and oversized tokens can cause HTTP request failures. Key learning
    outcomes include understanding why Keycloak defaults to verbose configurations,
    identifying truly necessary token contents, implementing data minimization strategies,
    and applying practical configuration settings for lean, secure tokens.'
  url: https://colocatedeventseu2026.sched.com/event/2DY1e/
  tags:
  - identity
  - keycloak
