  type: talk
  title: Making Observability Work at the Edge - Julia Furst Morgado, Dash0 & Graziano
    Casto, Akamas
  speakers: Julia Furst Morgado;Graziano Casto
  orgs: Dash0;Akamas
  room: Emerald Room
  track: Kubernetes on Edge Day
  level: Advanced
  description: This session addresses observability challenges in Edge Kubernetes
    environments. Sending full traces and metrics upstream doesn't scale when every
    byte and millisecond count. The speakers present an optimized OpenTelemetry Micro-Collector
    approach using data reduction techniques like Tail-Based Sampling and Lossless
    Batching to transmit only essential telemetry from Edge devices. The talk covers
    deployment of lightweight DaemonSets configured for K3s or MicroK8s using OpenTelemetry
    Collector Contrib, integration with Fluent Bit for log ingestion, and maintaining
    data integrity during network disconnections.
  url: https://colocatedeventseu2026.sched.com/event/2DY1Y/
  tags:
  - observability
  - otel
