  speakers: Shweta Vohra
  orgs: Booking.com
  room: Hall 8 | Room G
  track: Platform Engineering
  level: Intermediate
  description: 'Over the past year, platform engineering is shifting from building
    everything to building just enough. As teams re-architected and revived multiple
    internal platforms, one truth became clear: scale without intelligence is waste.
    The session explores how AI-native DevOps and lean Kubernetes architectures are
    reshaping platform engineering, discussing tools like k3s, k8s Gateway API, ambient
