  level: ''
  description: Over three years, Booking.com deployed Backstage as a central hub where
    1.5k employees access 45 custom tools and 400K software assets. However, users
    perceived it as many separate tools living side-by-side rather than an integrated
    platform. The team redesigned their approach to create a unified experience enabling
    cross-tool workflows. They built a centralized dashboard connecting key signals
    from multiple tools into one consolidated view, transforming how the organization
