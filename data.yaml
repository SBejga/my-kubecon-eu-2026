  speakers: Simone Rodigari
  orgs: Microsoft
  room: Hall 8 | Room G
  track: Cloud Native Novice
  level: Beginner
  description: 'This 30-minute session explores the internal mechanics of Kubernetes
    pod-to-pod communication. The presentation unpacks ''the Kubernetes network stack
    step by step: from Pod namespaces and virtual Ethernet pairs to CNI plugins, kube-proxy,
    and DNS,'' utilizing diagrams and command-line demonstrations. Key topics include
    how container network interfaces like Cilium and Calico enable pod connectivity,
    kube-proxy service management through iptables or IPVS, and CoreDNS name resolution.
    The speaker addresses common issues including misconfigured routes, DNS delays,
    and hairpin traffic, providing debugging techniques using ip, tcpdump, and kubectl
    commands.'
