  title: 'K8s-sigs NFD x SYLVA: Declarative Image-to-Node Compatibility for Telco
    Clouds'
  speakers: Eduardo Arango Gutierrez;Chaoyi Huang
  orgs: NVIDIA;Huawei Technology Co., Ltd
  room: Hall 8 | Room D
  track: Operations + Performance
  level: Intermediate
  description: The session addresses runtime failures in portable container images
    when host kernels, drivers, or hardware differ, particularly in telco/edge environments.
    It presents a field deployment developed collaboratively by Kubernetes SIGs Node
    Feature Discovery maintainers and the SYLVA telco-cloud community. The approach
    encodes host requirements as versioned OCI artifacts alongside images, validates
    target nodes before scheduling using NFD client tools, and integrates validation
    into admission, scheduling, and CI/CD workflows across heterogeneous platforms.
