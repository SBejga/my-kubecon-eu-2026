    and Kubernetes principles. Many containerized network functions marketed as 'cloud-native'
    retain traditional hardware-centric designs using Helm, Multus, and NETCONF rather
    than leveraging Kubernetes strengths. The presentation examines practical examples,
    including why User Plane Functions lack true cloud-native characteristics, and
    explores how 6G design might better align with Kubernetes-native patterns. It
    also discusses API exposure for treating networks as products and how Kubernetes
    foundations could enable simpler, faster, and more open mobile networks.
