  speakers: Willem Berroubache
  orgs: Orange
  room: Elicium 1
  track: AI + ML
  level: Intermediate
  description: The session presents an open-source autonomous AI agent framework utilizing
    Kubernetes and Kubeflow to enable real-time threat detection and response in cloud-native
    environments. It covers signal collection via OpenTelemetry, Falco, and Prometheus,
    ML-based behavior correlation through Kubeflow, and threat reasoning for account
    takeover, lateral movement, and privilege escalation. Integration with OPA, Kyverno,
    and GitOps enables automated remediation including rollback and isolation. The
    framework provides transparent decision explanations via contextual LLMs for auditability.
