  type: lightning_talk
  title: '⚡Lightning Talk: The < Meta /> Trick: Connecting Page Load To Backend Traces'
  speakers: Wolfgang Therrien
  orgs: Honeycomb
  room: Forum (Ground Floor)
  track: Observability Day
  level: ''
  description: The session addresses a critical gap in distributed tracing. Backend
    services are instrumented with tracing, and browser applications have OpenTelemetry
    integrated, yet traces miss everything before JavaScript loads. Wolfgang demonstrates
    embedding OpenTelemetry trace-parent data in meta tags during HTML generation,
    then reading it client-side to correlate document load, Core Web Vitals, and errors
    within a single trace. This enables querying complete end-to-end traces for the
    full user experience.
  url: https://colocatedeventseu2026.sched.com/event/2DY1n/
  tags:
  - observability
  - otel
