  title: Running Wasmtime in Hardware-Isolated Microenvironments - Danilo (Dan) Chiarlone,
    Microsoft
  speakers: Dan Chiarlone
  orgs: Microsoft
  room: E106-108
  track: WasmCon
  level: Intermediate
  description: 'The presentation explores combining WebAssembly''s sandboxing capabilities
    with hardware isolation for serverless environments. Two approaches are demonstrated:
