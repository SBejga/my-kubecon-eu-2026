  title: '18 Bluetooth Controllers Walk into a Bar: Observability & Runtime Configuration
    with CNCF Tools'
  speakers: Simon Schrottner;Manuel Timelthaler
  orgs: Dynatrace;Tractive
  room: Auditorium
  track: Observability
  level: Any
  description: A presentation exploring observability challenges when managing 18
    PlayStation Move controllers via Bluetooth in JoustMania, an open-source party
    game. The speakers address complexities including sampling from multiple wireless
    devices, correlating hardware events with gameplay, managing high-cardinality
    telemetry data, and runtime debugging. Solutions discussed include context-aware
    feature flags, intelligent sampling strategies, trace correlation between hardware
    and game logic, and leveraging OpenTelemetry. The session includes a live demonstration
    of real-time controller telemetry and behavior modification through GitHub-synchronized
    configuration flags.
