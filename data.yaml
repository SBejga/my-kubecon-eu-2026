  speakers: Mike Morris;Alan Grosskurth
  orgs: Microsoft;Google
  room: Hall 7 | Room B
  track: Connectivity
  level: Intermediate
  description: The session explores limitations of the Multi-cluster Service (MCS)
    API—an early Kubernetes specification for extending service networking across
    cluster boundaries. As multi-cluster needs have evolved from basic geo-replication
    to complex organizational topologies and GPU infrastructure sharing for AI workloads,
    challenges have emerged with 'overly-prescriptive DNS expectations, the difficulty
    of adopting namespace sameness principles across large organizations, and the
    lack of flexibility needed for sharing newer resources like InferencePool across
    clusters.' Presenters discuss practical limitations and propose addressing these
    challenges through the Gateway API ecosystem to enable enhanced service discovery
    and routing for contemporary networking requirements.
