  title: 'The Symbiosis of Storage and Workloads: Longhorn for Hyperconverged Block
    Storage'
  speakers: Jinhong Kim;Jangseon Ryu
  orgs: NAVER Corp;NAVER
  room: Hall 8 | Room E
  track: Data Processing + Storage
  level: Intermediate
  description: 'NAVER operates over one million Pods and 200,000+ block persistent
    volumes on Kubernetes using Ceph RBD. While Ceph provides excellent scalability,
    many workloads implement their own replication, creating redundancy and complicating
    fault isolation. To resolve these challenges, NAVER adopted a hyperconverged approach
    using Longhorn. However, this introduced new complications: storage and pod schedulers
    functioned independently, and storage operations like rebuilds could harm workload
    performance. Working with Longhorn maintainers, the team implemented coordinated
    scheduling to align storage with workloads and implemented resource controls that
    manage rebuild bandwidth to safeguard service I/O.'
