  speakers: Yashraj Kakkad
  orgs: Google
  room: Elicium 2
  track: Operations + Performance
  level: Advanced
  description: 'At Google Photos, the team developed an integrity pipeline for a trillion-object
    workload with balanced shards. However, at exabyte scale, the system exhibited
    ''tail latency behaviors that challenged our strictest reliability targets.''
    The talk explores how they identified the root cause - the non-linear impact of
    P99 latency - rather than data skew. It examines three solutions: traffic shaping,
    request hedging, and a novel ''Partition Alignment Principle'' architectural pattern,
    emphasizing that ''average performance is a vanity metric, and why predictability
    is the ultimate engineering constraint.'''
