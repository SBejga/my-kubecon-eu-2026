  title: 'Addressing Non-Deterministic Scheduling: Introducing the Node Readiness
    Controller'
  speakers: Ajay Sundar Karuppasamy;Sreeram Venkitesh;Karthik K N;Priyanka Saggu
  orgs: Google;DigitalOcean;IBM;SUSE
  room: F002-005
  track: Maintainer Track
  level: ''
  description: Kubernetes nodes report 'Ready' before critical dependencies like CNI
    plugins, storage drivers, or device plugins are fully functional. This readiness
    gap causes non-deterministic scheduling where sensitive workloads immediately
    fail upon placement. The Node Readiness Controller uses NodeReadinessRules to
    declaratively manage taints based on custom conditions, ensuring protected node
    initialization. The session covers architecture patterns leveraging the node-problem-detector
    ecosystem, roadmap discussion including current status and upcoming features,
    and cross-SIG alignment regarding interaction with scheduling primitives and autoscalers.
