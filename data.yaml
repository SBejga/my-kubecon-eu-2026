  type: talk
  title: 'To Swap or Not To Swap: Memory Management Design Patterns for AI Workloads
    in Kubernetes 1.34+'
  speakers: Nic Vermande
  orgs: ScaleOps
  room: Auditorium
  track: AI + ML
  level: Intermediate
  description: 'Kubernetes swap support is now stable, prompting reconsideration of
    whether swap remains problematic. For AI/ML workloads exceeding 100GB memory requirements,
    the answer involves nuance. The presentation examines scenarios where swap proves
    beneficial versus detrimental for GPU inference and training operations, covering
    three real-world production situations: Overcommitting Memory (operating multiple
    small models on shared nodes where occasional swap prevents OOM terminations),
    Burst Traffic Handling (leveraging swap as a buffer during traffic spikes when
    KV cache expands unexpectedly), and When Swap Causes Problems (training workloads
    and real-time inference where swap latency severely impacts performance). Attendees
    will understand precisely when to activate swap and when to keep it disabled,
    with production-validated configurations provided.'
  url: https://kccnceu2026.sched.com/event/2CVza/
