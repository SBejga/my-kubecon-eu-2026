<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#213A3E">
  <title>KubeCon EU 2026 · Talk Browser</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F2F1E7;
      --surface:  #ffffff;
      --border:   #d8d7cc;
      --text:     #213A3E;
      --muted:    #5a6e71;
      --primary:  #213A3E;
      --primary-light: #d5e8e9;
      --accent:   #CCE761;
      --mon:   #b45309; --mon-bg:   #fef3c7;
      --tue:   #065f46; --tue-bg:   #d1fae5;
      --wed:   #4338ca; --wed-bg:   #ede9fe;
      --thu:   #9f1239; --thu-bg:   #ffe4e6;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(33,58,62,.08), 0 2px 8px rgba(33,58,62,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--primary);
      color: #F2F1E7;
      padding: env(safe-area-inset-top, 0) 0 0;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 3px solid var(--accent);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 10px;
    }
    .header-top h1 { font-size: 1.1rem; font-weight: 700; }
    .header-top .subtitle { font-size: .75rem; color: var(--accent); margin-top: 1px; opacity: .85; }

    /* ── Tabs ────────────────────────────────────────── */
    .tabs {
      display: flex; border-top: 1px solid rgba(255,255,255,.15);
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; background: none; border: none;
      color: rgba(242,241,231,.6); font-size: .85rem; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active {
      color: var(--accent); border-bottom-color: var(--accent);
    }

    /* ── Search + filters ────────────────────────────── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px 8px;
      position: sticky; top: 88px; z-index: 90;
    }
    .search-wrap {
      position: relative; margin-bottom: 8px;
    }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; width: 16px; height: 16px;
    }
    #search {
      width: 100%; padding: 9px 36px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: .9rem; background: var(--bg);
      color: var(--text); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #search:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    #search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 1rem; line-height: 1; display: none; padding: 2px;
    }
    #search-clear.visible { display: block; }

    .filter-row {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row.days { margin-bottom: 6px; }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 20px;
      font-size: .78rem; font-weight: 600; white-space: nowrap;
      border: 1.5px solid transparent; cursor: pointer;
      transition: all .15s; flex-shrink: 0;
      background: var(--bg); color: var(--muted); border-color: var(--border);
    }
    .chip:active { transform: scale(.95); }

    .chip.day-all.active, .chip.day-all:hover { background: var(--accent); color: var(--primary); border-color: var(--accent); }
    .chip.day-mon { color: var(--mon); border-color: #fcd34d; background: var(--mon-bg); }
    .chip.day-mon.active, .chip.day-mon:hover { background: var(--mon); color: white; }
    .chip.day-tue { color: var(--tue); border-color: #6ee7b7; background: var(--tue-bg); }
    .chip.day-tue.active, .chip.day-tue:hover { background: var(--tue); color: white; }
    .chip.day-wed { color: var(--wed); border-color: #a5b4fc; background: var(--wed-bg); }
    .chip.day-wed.active, .chip.day-wed:hover { background: var(--wed); color: white; }
    .chip.day-thu { color: var(--thu); border-color: #fda4af; background: var(--thu-bg); }
    .chip.day-thu.active, .chip.day-thu:hover { background: var(--thu); color: white; }

    .tag-chip { background: var(--bg); color: var(--muted); border-color: var(--border); }
    .tag-chip.active { background: var(--accent); color: var(--primary); border-color: var(--accent); font-weight: 700; }

    .past-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 20px; cursor: pointer;
      font-size: .78rem; font-weight: 600; color: var(--muted);
      background: var(--bg); border: 1.5px solid var(--border);
      user-select: none; transition: all .15s;
    }
    .past-toggle input { accent-color: var(--primary); cursor: pointer; }
    .past-toggle.on { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }


    /* ── Results meta ────────────────────────────────── */
    .results-meta {
      padding: 8px 16px 4px;
      font-size: .8rem; color: var(--muted); font-weight: 500;
    }

    /* ── Talk cards ──────────────────────────────────── */
    #talks-view { padding: 0 12px 80px; }
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px; padding-top: 8px;
    }
    @media (min-width: 640px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1024px) {
      .cards-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      overflow: hidden; cursor: pointer;
      transition: box-shadow .15s, transform .1s;
    }
    .card:active { transform: scale(.99); }
    .card.expanded { cursor: default; }

    .card-header {
      padding: 10px 12px 8px;
      border-left: 4px solid var(--primary);
    }
    .card-header.day-Monday    { border-left-color: #f59e0b; }
    .card-header.day-Tuesday   { border-left-color: #10b981; }
    .card-header.day-Wednesday { border-left-color: #6366f1; }
    .card-header.day-Thursday  { border-left-color: #f43f5e; }

    .card-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px; flex-wrap: wrap; gap: 4px;
    }
    .card-time {
      font-size: .72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .02em;
    }
    .card-type {
      font-size: .68rem; padding: 1px 6px; border-radius: 4px;
      background: var(--bg); color: var(--muted); border: 1px solid var(--border);
      font-weight: 600; text-transform: lowercase;
    }
    .card-type.keynote, .card-type.sponsored_keynote { background: #fef9c3; color: #92400e; border-color: #fcd34d; }
    .card-type.lightning_talk { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .card-type.panel { background: #f0f9ff; color: #075985; border-color: #bae6fd; }
    .card-type.tutorial, .card-type.workshop { background: #fdf4ff; color: #7e22ce; border-color: #e9d5ff; }
    .card-type.contribfest { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }

    .card-title {
      font-size: .9rem; font-weight: 700; line-height: 1.35;
      margin-bottom: 4px; color: var(--text);
    }
    .card-room {
      font-size: .73rem; color: var(--muted); margin-bottom: 4px;
    }
    .card-speakers {
      font-size: .75rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .card-body { padding: 0 12px 10px; }

    .card-tags {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 0 4px;
    }
    .tag {
      font-size: .66rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; letter-spacing: .02em;
    }

    .card-desc {
      font-size: .8rem; color: var(--muted); line-height: 1.5;
      margin-top: 6px;
    }
    .card-desc.collapsed {
      display: -webkit-box; -webkit-box-orient: vertical;
      -webkit-line-clamp: 3; overflow: hidden;
    }
    .card-expand-btn {
      font-size: .75rem; color: var(--primary); background: none;
      border: none; cursor: pointer; padding: 4px 0 0; font-weight: 600;
      display: block;
    }
    .card-link {
      display: inline-block; margin-top: 8px; font-size: .75rem;
      color: var(--primary); text-decoration: none; font-weight: 600;
    }
    .card-link:hover { text-decoration: underline; }

    /* ── Tag color palette ───────────────────────────── */
    .t-argocd       { background: #fee2e2; color: #b91c1c; }
    .t-crossplane   { background: #fef3c7; color: #92400e; }
    .t-terraform    { background: #ede9fe; color: #5b21b6; }
    .t-helm         { background: #fce7f3; color: #9d174d; }
    .t-keycloak     { background: #ffedd5; color: #9a3412; }
    .t-otel         { background: #cffafe; color: #164e63; }
    .t-mcp          { background: #dbeafe; color: #1e40af; }
    .t-ai-agents    { background: #f0fdf4; color: #14532d; }
    .t-cilium       { background: #d1fae5; color: #065f46; }
    .t-gitops       { background: #e0e7ff; color: #3730a3; }
    .t-platform-eng { background: #f0f9ff; color: #0c4a6e; }
    .t-multi-tenancy{ background: #fdf4ff; color: #6b21a8; }
    .t-cert-manager { background: #fff1f2; color: #881337; }
    .t-policy       { background: #ecfdf5; color: #064e3b; }
    .t-opa          { background: #f0fdf4; color: #14532d; }
    .t-security     { background: #fef2f2; color: #991b1b; }
    .t-observability{ background: #fffbeb; color: #78350f; }
    .t-networking   { background: #f0fdfa; color: #134e4a; }
    .t-identity     { background: #faf5ff; color: #581c87; }
    .t-cost         { background: #f7fee7; color: #3f6212; }
    .t-backstage    { background: #e0f2fe; color: #0369a1; }
    .t-ai           { background: #f0fdf4; color: #166534; }
    .t-social       { background: var(--primary-light); color: var(--primary); }
    .card-type.social { background: var(--accent); color: var(--primary); border-color: var(--accent); }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty h3 { font-size: 1rem; margin-bottom: 6px; }

    /* ── Schedule view ───────────────────────────────── */
    #schedule-view {
      display: none; padding: 16px 16px 80px;
      max-width: 900px; margin: 0 auto;
    }
    #schedule-content { background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px 16px; box-shadow: var(--shadow); }
    #schedule-content h1 { font-size: 1.3rem; margin-bottom: 8px; }
    #schedule-content h2 { font-size: 1.1rem; margin: 24px 0 10px; padding-bottom: 6px;
      border-bottom: 3px solid var(--accent); color: var(--primary); }
    #schedule-content h3 { font-size: .95rem; margin: 16px 0 8px; color: var(--text); }
    #schedule-content h4 { font-size: .85rem; margin: 12px 0 6px; color: var(--muted); }
    #schedule-content p { font-size: .85rem; line-height: 1.6; margin-bottom: 8px; color: var(--text); }
    #schedule-content ul, #schedule-content ol { padding-left: 20px; font-size: .85rem; line-height: 1.6; margin-bottom: 8px; }
    #schedule-content li { margin-bottom: 2px; }
    #schedule-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: .8rem; overflow-x: auto; display: block; }
    #schedule-content th { background: var(--primary); color: var(--accent); padding: 8px 10px; text-align: left;
      border: 1px solid var(--border); font-weight: 700; }
    #schedule-content td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; }
    #schedule-content tr:nth-child(even) td { background: var(--bg); }
    #schedule-content code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .8em;
      background: var(--bg); padding: 1px 4px; border-radius: 3px; }
    #schedule-content blockquote { border-left: 3px solid var(--primary); padding: 6px 12px;
      margin: 10px 0; background: var(--bg); border-radius: 0 6px 6px 0; }
    #schedule-content blockquote p { margin-bottom: 0; }
    #schedule-content strong { font-weight: 700; }
    #schedule-content a { color: var(--primary); }
    #schedule-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }


    /* ── Loading spinner ─────────────────────────────── */
    #loader { text-align: center; padding: 60px; color: var(--muted); display: none; }

    /* ── Highlight ───────────────────────────────────── */
    mark { background: var(--accent); color: var(--primary); border-radius: 2px; padding: 0 2px; font-weight: 600; }

    /* ── Scroll to top btn ───────────────────────────── */
    #scroll-top {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); right: 16px;
      width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
      color: var(--primary); border: none; cursor: pointer; font-size: 1.2rem; font-weight: 700;
      box-shadow: 0 4px 12px rgba(204,231,97,.5); display: none; align-items: center;
      justify-content: center; z-index: 50;
    }
    #scroll-top.visible { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>☸ KubeCon EU 2026</h1>
      <div class="subtitle">Amsterdam · March 23–26</div>
    </div>
    <div id="talk-count-badge" style="font-size:.75rem;opacity:.8;font-weight:600;"></div>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" onclick="showTab('talks')">🔍 Talks</button>
    <button class="tab-btn" onclick="showTab('schedule')">📅 Schedule</button>
  </nav>
</header>

<div class="controls" id="talks-controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="search" placeholder="Search talks, speakers, topics…" autocomplete="off" spellcheck="false">
    <button id="search-clear" onclick="clearSearch()" aria-label="Clear">✕</button>
  </div>

  <div class="filter-row days" id="day-filters">
    <span class="chip day-all active" data-day="">All days</span>
    <span class="chip day-mon" data-day="Monday">Mon 23</span>
    <span class="chip day-tue" data-day="Tuesday">Tue 24</span>
    <span class="chip day-wed" data-day="Wednesday">Wed 25</span>
    <span class="chip day-thu" data-day="Thursday">Thu 26</span>
  </div>

  <div class="filter-row" id="priority-filters" style="display:none">
    <span style="font-size:.78rem;font-weight:600;color:var(--muted);flex-shrink:0;line-height:28px">Priority:</span>
    <span class="chip tag-chip prio-chip" data-prio="1">★ Recommended</span>
    <span class="chip tag-chip prio-chip" data-prio="2">★★ High priority</span>
    <span class="chip tag-chip prio-chip" data-prio="3">★★★ Must-see</span>
  </div>
  <div class="filter-row" id="tag-filters">
    <!-- populated by JS -->
  </div>
  <div style="padding-top:6px">
    <label class="past-toggle" id="hide-past-label">
      <input type="checkbox" id="hide-past"> Hide past talks
    </label>
  </div>
</div>

<div class="results-meta" id="results-meta"></div>

<div id="talks-view">
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="icon">🔭</div>
    <h3>No talks found</h3>
    <p>Try adjusting your search or filters.</p>
  </div>
</div>

<div id="schedule-view">
  <div id="schedule-content">Loading schedule…</div>
</div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

<script>
// ── Talks data (populated asynchronously from data.yaml) ─
let TALKS_DATA = [];

// ── Tag config ──────────────────────────────────────────
// Social / networking events not in sched.com — injected manually
const SOCIAL_EVENTS = [
  { day:'Monday',    date:'2026-03-23', time_start:'17:30', time_end:'18:30', type:'social',
    title:'Evening Reception', speakers:'', orgs:'', room:'Hall 3', track:'', level:'',
    description:'Opening evening reception after the co-located events day. Connect with the ArgoCon, CiliumCon, and Agentics Day communities.',
    url:'', tags:['social'], priority:0 },
  { day:'Tuesday',   date:'2026-03-24', time_start:'17:30', time_end:'19:00', type:'social',
    title:'KubeCrawl + CloudNativeFest', speakers:'', orgs:'', room:'Exhibition Hall', track:'', level:'',
    description:'The main KubeCon networking event. Visit sponsor booths, meet project maintainers (Crossplane/Upbound, ArgoCD, Cilium), and connect with the cloud native community.',
    url:'https://kccnceu2026.sched.com', tags:['social'], priority:0 },
];

const TAG_LABELS = {
  'argocd':        '⚙ ArgoCD',
  'crossplane':    '🔧 Crossplane',
  'terraform':     '🏗 Terraform/OTF',
  'helm':          '⛵ Helm',
  'keycloak':      '🔑 Keycloak',
  'otel':          '📡 OTel',
  'mcp':           '🤖 MCP',
  'ai-agents':     '🧠 AI Agents',
  'cilium':        '🐝 Cilium',
  'gitops':        '🌿 GitOps',
  'platform-eng':  '🏛 Platform Eng',
  'multi-tenancy': '🏢 Multi-Tenancy',
  'cert-manager':  '🔒 cert-manager',
  'policy':        '📋 Policy',
  'opa':           '🛡 OPA',
  'security':      '🔐 Security',
  'observability': '👁 Observability',
  'networking':    '🌐 Networking',
  'identity':      '🪪 Identity',
  'cost':          '💰 Cost',
  'backstage':     '🎭 Backstage',
  'ai':            '✨ AI/ML',
  'social':        '🍻 Social/Networking',
};

// Priority order for tag display
const TAG_ORDER = [
  'argocd','crossplane','terraform','mcp','ai-agents','platform-eng',
  'keycloak','otel','gitops','cilium','multi-tenancy','policy','opa',
  'cert-manager','helm','identity','cost','security','observability',
  'networking','backstage','ai','social'
];

// ── State ───────────────────────────────────────────────
let query = '';
let selectedDay = '';
let selectedTags = new Set();
let expandedCards = new Set();
let currentTab = 'talks';
let scheduleLoaded = false;
let debounceTimer = null;
let hidePast = false;
let selectedPriorities = new Set(); // talks tab priority filter
let schedDay = '';  // schedule tab day filter

const CONF_DATES = { Monday:'2026-03-23', Tuesday:'2026-03-24', Wednesday:'2026-03-25', Thursday:'2026-03-26' };

function isPast(t) {
  const d = CONF_DATES[t.day];
  if (!d || !t.time_end) return false;
  return new Date(`${d}T${t.time_end}:00`) < new Date();
}

// ── Init ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetch('data.yaml')
    .then(r => r.text())
    .then(text => {
      TALKS_DATA.push(...jsyaml.load(text));
      TALKS_DATA.push(...SOCIAL_EVENTS);
      buildTagFilters();
      loadPriorities();
      render();
      document.getElementById('talk-count-badge').textContent = TALKS_DATA.length + ' talks';

  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      query = e.target.value.trim();
      document.getElementById('search-clear').classList.toggle('visible', query.length > 0);
      render();
    }, 180);
  });

  // Day filter chips
  document.getElementById('day-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip[data-day]');
    if (!chip) return;
    document.querySelectorAll('#day-filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedDay = chip.dataset.day;
    render();
  });

  // Tag filter chips
  document.getElementById('tag-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.chip[data-tag]');
    if (!chip) return;
    const tag = chip.dataset.tag;
    if (selectedTags.has(tag)) {
      selectedTags.delete(tag);
      chip.classList.remove('active');
    } else {
      selectedTags.add(tag);
      chip.classList.add('active');
    }
    render();
  });

  // Priority filter chips
  document.getElementById('priority-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('.prio-chip');
    if (!chip) return;
    const val = parseInt(chip.dataset.prio);
    selectedPriorities.has(val) ? selectedPriorities.delete(val) : selectedPriorities.add(val);
    chip.classList.toggle('active', selectedPriorities.has(val));
    render();
  });

  // Hide past toggle
  document.getElementById('hide-past').addEventListener('change', (e) => {
    hidePast = e.target.checked;
    document.getElementById('hide-past-label').classList.toggle('on', hidePast);
    render();
  });

  // Scroll-to-top
  window.addEventListener('scroll', () => {
    document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
    })
    .catch(err => {
      console.error('Failed to load data.yaml:', err);
      document.getElementById('cards-grid').innerHTML = '<p style="padding:16px;color:var(--muted)">Failed to load talk data. Please refresh the page.</p>';
    });
});

// ── Priority loading ──────────────────────────────────────
function loadPriorities() {
  fetch('schedule.md')
    .then(r => r.text())
    .then(text => {
      // Parse cross-week highlights: | ★★ | Title | Day | Room |
      const priorityMap = new Map();
      let inSection = false;
      text.split('\n').forEach(line => {
        if (/cross.week highlights/i.test(line)) { inSection = true; return; }
        if (inSection && /^##\s/.test(line)) { inSection = false; return; }
        if (!inSection) return;
        const m = line.match(/^\|\s*(★+)\s*\|\s*(.+?)\s*\|/);
        if (m) priorityMap.set(normKey(m[2]), m[1].length);
      });

      // Stamp .priority onto every TALKS_DATA entry
      TALKS_DATA.forEach(t => {
        const key = normKey(t.title);
        let p = priorityMap.get(key) || 0;
        if (!p) {
          for (const [k, v] of priorityMap) {
            if (key.length > 10 && k.length > 10 && key.slice(0, 28) === k.slice(0, 28)) { p = v; break; }
          }
        }
        t.priority = p;
      });

      document.getElementById('priority-filters').style.display = '';
      render();
    })
    .catch(() => {}); // silently skip if offline
}

function buildTagFilters() {
  const wrap = document.getElementById('tag-filters');
  // Get tags that actually exist in data
  const existing = new Set(TALKS_DATA.flatMap(t => t.tags));
  TAG_ORDER.filter(t => existing.has(t)).forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'chip tag-chip';
    chip.dataset.tag = tag;
    chip.textContent = TAG_LABELS[tag] || '#' + tag;
    wrap.appendChild(chip);
  });
}

// ── Filtering ────────────────────────────────────────────
function filterTalks() {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  return TALKS_DATA.filter(t => {
    if (hidePast && isPast(t)) return false;
    if (selectedPriorities.size > 0 && !selectedPriorities.has(t.priority || 0)) return false;
    if (selectedDay && t.day !== selectedDay) return false;
    if (selectedTags.size > 0 && !t.tags.some(tag => selectedTags.has(tag))) return false;
    if (terms.length > 0) {
      const hay = `${t.title} ${t.description} ${t.speakers} ${t.orgs} ${t.room} ${t.tags.join(' ')}`.toLowerCase();
      if (!terms.every(term => hay.includes(term))) return false;
    }
    return true;
  });
}

// ── Rendering ────────────────────────────────────────────
function render() {
  const filtered = filterTalks();
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  const meta = document.getElementById('results-meta');

  meta.textContent = query || selectedDay || selectedTags.size > 0
    ? `${filtered.length} of ${TALKS_DATA.length} talks`
    : `${TALKS_DATA.length} talks · 4 days`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Group by day+time for display
  grid.innerHTML = filtered.map(t => cardHTML(t)).join('');
  // Re-attach expand listeners
  grid.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    if (expandedCards.has(id)) card.classList.add('expanded');
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      if (e.target.tagName === 'BUTTON') return;
      if (!card.classList.contains('expanded')) {
        expandCard(card, id);
      }
    });
    const expandBtn = card.querySelector('.card-expand-btn');
    if (expandBtn) expandBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isExpanded = card.classList.contains('expanded');
      if (isExpanded) collapseCard(card, id);
      else expandCard(card, id);
    });
  });
}

function expandCard(card, id) {
  card.classList.add('expanded');
  expandedCards.add(id);
  const desc = card.querySelector('.card-desc');
  if (desc) desc.classList.remove('collapsed');
  const btn = card.querySelector('.card-expand-btn');
  if (btn) btn.textContent = '▲ Show less';
}

function collapseCard(card, id) {
  card.classList.remove('expanded');
  expandedCards.delete(id);
  const desc = card.querySelector('.card-desc');
  if (desc) desc.classList.add('collapsed');
  const btn = card.querySelector('.card-expand-btn');
  if (btn) btn.textContent = '▼ Show more';
}

function highlight(text, terms) {
  if (!terms || terms.length === 0) return esc(text);
  let result = esc(text);
  terms.filter(Boolean).forEach(term => {
    const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const DAY_SHORT = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu' };

function cardHTML(t) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const id = t.url || t.title;
  const isExpanded = expandedCards.has(id);
  const desc = t.description || '';
  const hasSched = t.url;

  const tagsHTML = t.tags.map(tag =>
    `<span class="tag t-${tag}">${TAG_LABELS[tag] || '#'+tag}</span>`
  ).join('');

  const speakerStr = t.speakers ? t.speakers.replace(/;/g, ' · ') : '';
  const orgStr = t.orgs ? ' — ' + t.orgs.split(';').slice(0,2).join(', ') : '';

  const levelBadge = t.level ? `<span class="card-type" style="margin-left:4px">${esc(t.level)}</span>` : '';

  const prio = t.priority || 0;
  const prioBadge = prio ? `<span style="
    display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;
    font-size:.72rem;font-weight:800;letter-spacing:.02em;margin-left:4px;
    background:var(--accent);color:var(--primary);border:1px solid var(--accent)
  ">${'★'.repeat(prio)}</span>` : '';

  return `
  <div class="card${isExpanded ? ' expanded' : ''}" data-id="${esc(id)}">
    <div class="card-header day-${esc(t.day)}">
      <div class="card-meta">
        <span class="card-time">${esc(DAY_SHORT[t.day]||t.day)} ${esc(t.time_start)}–${esc(t.time_end)}</span>
        <div>
          <span class="card-type ${esc(t.type)}">${esc(t.type?.replace(/_/g,' '))}</span>
          ${levelBadge}
          ${prioBadge}
        </div>
      </div>
      <div class="card-title">${highlight(t.title, terms)}</div>
      <div class="card-room">📍 ${esc(t.room)}</div>
      ${speakerStr ? `<div class="card-speakers">👤 ${highlight(speakerStr + orgStr, terms)}</div>` : ''}
    </div>
    <div class="card-body">
      ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
      ${desc ? `
        <div class="card-desc${isExpanded ? '' : ' collapsed'}">${highlight(desc, terms)}</div>
        <button class="card-expand-btn">${isExpanded ? '▲ Show less' : '▼ Show more'}</button>
      ` : ''}
      ${hasSched ? `<a class="card-link" href="${esc(t.url)}" target="_blank" rel="noopener">↗ Event page</a>` : ''}
    </div>
  </div>`;
}

// ── Tab switching ─────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0) === (tab === 'talks'));
  });
  document.getElementById('talks-view').style.display = tab === 'talks' ? 'block' : 'none';
  document.getElementById('talks-controls').style.display = tab === 'talks' ? 'block' : 'none';
  document.getElementById('results-meta').style.display = tab === 'talks' ? 'block' : 'none';
  document.getElementById('schedule-view').style.display = tab === 'schedule' ? 'block' : 'none';

  if (tab === 'schedule' && !scheduleLoaded) loadSchedule();
}

function loadSchedule() {
  scheduleLoaded = true;
  fetch('schedule.md')
    .then(r => r.text())
    .then(md => {
      // Add anchor IDs to day headings
      md = md.replace(/^## (Monday.*)$/m, '<a name="monday"></a>\n## $1')
             .replace(/^## (Tuesday.*)$/m, '<a name="tuesday"></a>\n## $1')
             .replace(/^## (Wednesday.*)$/m, '<a name="wednesday"></a>\n## $1')
             .replace(/^## (Thursday.*)$/m, '<a name="thursday"></a>\n## $1');
      document.getElementById('schedule-content').innerHTML = marked.parse(md);
      processSchedule();
    })
    .catch(() => {
      document.getElementById('schedule-content').innerHTML =
        '<p>Could not load schedule. <a href="schedule.md">View raw file</a></p>';
    });
}

// ── Schedule interactivity ────────────────────────────────
function normKey(s) {
  return s.replace(/★+\s*/g, '').replace(/[^\w\s]/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
}

function buildTitleMap() {
  const map = new Map();
  TALKS_DATA.forEach(t => {
    if (t.url) map.set(normKey(t.title), t.url);
  });
  return map;
}

function findUrl(titleMap, text) {
  const key = normKey(text);
  if (titleMap.has(key)) return titleMap.get(key);
  for (const [k, v] of titleMap) {
    const len = Math.min(32, key.length, k.length);
    if (len > 12 && key.slice(0, len) === k.slice(0, len)) return v;
  }
  return null;
}

// Link bold talk titles in table cells to sched.com
function linkScheduleTitles(titleMap) {
  document.querySelectorAll('#schedule-content td strong').forEach(strong => {
    if (strong.querySelector('a')) return;
    const url = findUrl(titleMap, strong.textContent);
    if (!url) return;
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.style.cssText = 'color:inherit;text-decoration:none;border-bottom:1.5px solid var(--accent);padding-bottom:1px';
    while (strong.firstChild) a.appendChild(strong.firstChild);
    strong.appendChild(a);
  });
}

// Extract abstracts section → inject as expandable rows into day tables
function injectAbstracts(content) {
  const abstractMap = new Map();
  let inAbstracts = false;
  let currentKey = null;
  const toHide = [];

  Array.from(content.children).forEach(el => {
    if (el.tagName === 'H2' && /verified talk abstracts/i.test(el.textContent)) {
      inAbstracts = true; toHide.push(el); return;
    }
    if (!inAbstracts) return;
    if (/report generated/i.test(el.textContent)) return; // keep footer
    toHide.push(el);
    if (el.tagName === 'P' && el.querySelector('strong')) {
      currentKey = normKey(el.querySelector('strong').textContent);
    } else if (el.tagName === 'BLOCKQUOTE' && currentKey) {
      abstractMap.set(currentKey, el.innerHTML);
      currentKey = null;
    }
  });
  toHide.forEach(el => el.style.display = 'none');

  // Inject into day table rows
  content.querySelectorAll('tbody tr[data-stars]').forEach(row => {
    if (parseInt(row.dataset.stars) === 0) return;
    const strong = row.querySelector('td strong');
    if (!strong) return;
    const abstract = abstractMap.get(normKey(strong.textContent))
      || (() => { for (const [k,v] of abstractMap) { if (normKey(strong.textContent).slice(0,28) === k.slice(0,28) && k.length > 12) return v; } })();
    if (!abstract) return;

    const colCount = row.querySelectorAll('td').length;
    const detailRow = document.createElement('tr');
    detailRow.className = 'abstract-row';
    detailRow.dataset.day = row.dataset.day || '';
    detailRow.dataset.isAbstract = '1';
    detailRow.style.display = 'none';
    detailRow.innerHTML = `<td colspan="${colCount}" style="padding:0 0 6px 0;border-top:none">
      <div style="border-left:3px solid var(--accent);margin:0 8px;padding:8px 12px;background:var(--bg);font-size:.8rem;color:var(--muted);line-height:1.6;border-radius:0 0 6px 6px">${abstract}</div>
    </td>`;

    const btn = document.createElement('button');
    btn.className = 'abs-toggle';
    btn.textContent = '▼ abstract';
    btn.style.cssText = 'display:inline-block;margin-top:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.68rem;font-weight:700;padding:0;letter-spacing:.03em;text-transform:uppercase;opacity:.8';
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const open = detailRow.style.display !== 'none';
      detailRow.style.display = open ? 'none' : '';
      btn.textContent = open ? '▼ abstract' : '▲ abstract';
    });

    const titleCell = row.querySelector('td:nth-child(2)') || row.querySelector('td');
    if (titleCell) titleCell.appendChild(btn);
    row.insertAdjacentElement('afterend', detailRow);
  });
}

// Build a priority map from the cross-week highlights table (before it's replaced)
// Returns Map<normKey → starCount>
function buildPriorityMap(content) {
  const map = new Map();
  let h2 = null, table = null;
  for (const el of content.children) {
    if (!h2 && el.tagName === 'H2' && /cross.week/i.test(el.textContent)) { h2 = el; continue; }
    if (h2 && !table && el.tagName === 'TABLE') { table = el; break; }
  }
  if (!table) return map;
  table.querySelectorAll('tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length < 2) return;
    const stars = (cells[0].textContent.match(/★/g) || []).length;
    if (!stars) return;
    map.set(normKey(cells[1].textContent), stars);
  });
  return map;
}

// Transform cross-week highlights table into priority tier cards
function enhanceCrossWeek(content, titleMap) {
  let h2 = null, table = null;
  for (const el of content.children) {
    if (!h2 && el.tagName === 'H2' && /cross.week/i.test(el.textContent)) { h2 = el; continue; }
    if (h2 && !table && el.tagName === 'TABLE') { table = el; break; }
  }
  if (!table) return;

  const groups = { 3: [], 2: [], 1: [] };
  table.querySelectorAll('tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length < 4) return;
    const stars = (cells[0].textContent.match(/★/g) || []).length;
    if (!stars) return;
    groups[Math.min(stars, 3)].push({
      title: cells[1].textContent.trim(),
      day:   cells[2].textContent.trim(),
      room:  cells[3].textContent.trim(),
    });
  });

  const tierCfg = {
    3: { label: '★★★ Must-see',     bg: 'var(--primary)', color: 'var(--accent)',       border: 'var(--primary)' },
    2: { label: '★★ High priority', bg: 'var(--primary-light)', color: 'var(--primary)', border: '#a0c4c8' },
    1: { label: '★ Recommended',    bg: 'var(--bg)',       color: 'var(--text)',          border: 'var(--border)' },
  };

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'margin-bottom:8px';
  [3, 2, 1].forEach(tier => {
    if (!groups[tier].length) return;
    const { label, bg, color, border } = tierCfg[tier];
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:14px';
    section.innerHTML = `<div style="font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${label}</div>`;
    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:4px';
    groups[tier].forEach(({ title, day, room }) => {
      const url = findUrl(titleMap, title);
      const item = document.createElement('div');
      item.style.cssText = `display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:${bg};border:1px solid ${border};`;
      const titleEl = url
        ? `<a href="${esc(url)}" target="_blank" rel="noopener" style="color:${color};text-decoration:none;border-bottom:1.5px solid var(--accent);padding-bottom:1px;font-weight:600;font-size:.82rem;flex:1;line-height:1.3">${esc(title)}</a>`
        : `<span style="color:${color};font-weight:600;font-size:.82rem;flex:1;line-height:1.3">${esc(title)}</span>`;
      item.innerHTML = `${titleEl}
        <span style="font-size:.7rem;font-weight:600;color:${color};opacity:.75;white-space:nowrap;flex-shrink:0">${esc(day)}</span>`;
      list.appendChild(item);
    });
    section.appendChild(list);
    wrapper.appendChild(section);
  });
  table.replaceWith(wrapper);
}

function processSchedule() {
  const content = document.getElementById('schedule-content');
  const titleMap = buildTitleMap();
  const priorityMap = buildPriorityMap(content); // parse cross-week table before it's replaced

  // Tag top-level elements and their rows by day
  let currentDay = '';
  Array.from(content.children).forEach(el => {
    if (el.tagName === 'H2') {
      const t = el.textContent;
      currentDay = /monday/i.test(t) ? 'Monday' : /tuesday/i.test(t) ? 'Tuesday'
                 : /wednesday/i.test(t) ? 'Wednesday' : /thursday/i.test(t) ? 'Thursday' : '';
    }
    el.dataset.day = currentDay;
    if (el.querySelectorAll) el.querySelectorAll('tbody tr').forEach(row => {
      row.dataset.day = currentDay;
      const text = row.textContent;
      const rowStars = (text.match(/★/g) || []).length;
      // Check cross-week priority override for this row's primary talk
      const strong = row.querySelector('td strong');
      const overrideStars = strong ? (priorityMap.get(normKey(strong.textContent)) || 0) : 0;
      row.dataset.stars = Math.max(rowStars, overrideStars);
      if (/coffee|lunch|break|reception|kubecrawl|evening|dinner/i.test(text)) row.dataset.type = 'break';
    });
  });

  injectAbstracts(content);            // collapse abstracts section → inline expand buttons
  enhanceCrossWeek(content, titleMap); // transform highlights table → tier cards
  linkScheduleTitles(titleMap);   // link bold titles in tables

  // Build filter bar
  const existing = document.getElementById('sched-filter-bar');
  if (existing) existing.remove();
  const bar = document.createElement('div');
  bar.id = 'sched-filter-bar';
  bar.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:12px';
  bar.innerHTML = `
    <div class="filter-row" style="margin:0">
      <span style="font-size:.78rem;font-weight:600;color:var(--muted);flex-shrink:0;line-height:28px">Day:</span>
      <span class="chip day-all sched-day active" data-day="">All days</span>
      <span class="chip day-mon sched-day" data-day="Monday">Mon 23</span>
      <span class="chip day-tue sched-day" data-day="Tuesday">Tue 24</span>
      <span class="chip day-wed sched-day" data-day="Wednesday">Wed 25</span>
      <span class="chip day-thu sched-day" data-day="Thursday">Thu 26</span>
    </div>`;

  bar.querySelectorAll('.sched-day').forEach(chip => {
    if (chip.dataset.day === schedDay) chip.classList.add('active'); else chip.classList.remove('active');
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.sched-day').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      schedDay = chip.dataset.day;
      applySchedFilter();
    });
  });

  document.getElementById('schedule-view').insertBefore(bar, content);
  applySchedFilter();
}

function applySchedFilter() {
  const content = document.getElementById('schedule-content');

  // Step 1: day filter — show/hide entire sections
  Array.from(content.children).forEach(el => {
    if (!schedDay) { el.style.display = ''; return; }
    const d = el.dataset.day;
    el.style.display = (!d || d === schedDay) ? '' : 'none';
  });

  // Step 2: reset abstract detail rows on day change
  content.querySelectorAll('.abstract-row').forEach(row => {
    row.style.display = 'none';
    const prev = row.previousElementSibling;
    if (prev) { const btn = prev.querySelector('.abs-toggle'); if (btn) btn.textContent = '▼ abstract'; }
  });
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  query = '';
  render();
}
